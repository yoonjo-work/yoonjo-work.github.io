# Site Settings
locale: "en-US"
title: "Yoon Joo Jo"
title_separator: "-"
subtitle: "Assistant Professor of Economics"
name: &name "Yoon Joo Jo"
description: &description "Assistant Professor of Economics at Texas A&M University"
url: "https://yoonjo-work.github.io"
baseurl: ""
repository: "yoonjo-work/yoonjo-work.github.io"

# Author Settings
author:
  name: "Yoon Joo Jo"
  avatar: "images/profile.jpg"  # place your photo here
  bio: "Assistant Professor of Economics at Texas A&M University. Research interests: Macroeconomics, International Economics, and Behavioral Economics."
  location: "College Station, TX"
  employer: "Texas A&M University"
  email: "yoonjo@tamu.edu"
  uri: "https://yoonjo-work.github.io"
  googlescholar: "https://scholar.google.com/citations?user=N4IceroAAAAJ&hl=en"
  twitter: "yoonjoo_jo"
  linkedin: "yoon-joo-jo"
  github: ""
  orcid: ""

# Reading Files
include:
  - .htaccess
  - _pages

# Navigation
navigation:
  - title: "Home"
    url: /
  - title: "Research"
    url: /research/
  - title: "CV"
    url: /cv/

# Build Settings
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
